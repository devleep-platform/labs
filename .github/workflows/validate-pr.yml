name: Validate Lab PR

on:
  pull_request:
    paths:
      - 'labs/**/*.yaml'
      - 'scripts/*.py'
  workflow_dispatch:

jobs:
  validate:
    name: Validate Lab Definitions
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Get changed YAML files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'labs/**/*.yaml' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Changed files: $FILES"

      - name: Validate changed labs
        id: validate
        run: |
          set +e
          python scripts/validate_labs.py ${{ steps.changed.outputs.files }} 2>&1 | tee /tmp/validation_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/validation_output.txt', 'utf8');
            const passed = '${{ steps.validate.outputs.exit_code }}' === '0';

            const body = [
              passed ? '## ✅ Lab Validation Passed' : '## ❌ Lab Validation Failed',
              '',
              '```',
              output.trim(),
              '```',
              '',
              passed
                ? '_All changed lab definitions are valid. Ready for human review._'
                : '_Fix the errors above, commit and push — validation will re-run automatically._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if invalid
        if: steps.validate.outputs.exit_code != '0'
        run: exit 1

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
