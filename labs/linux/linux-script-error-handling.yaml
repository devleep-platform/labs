metadata:
  version: 1.0.0
  author: devleep-core
  reviewed_by:
    - linux-sme
    - security-sme
  last_updated: 2026-06-13

id: linux-script-error-handling
title: "Script Error Handling: Write Scripts That Fail Safely"
description: >
  Write a deployment script that detects failures, cleans up after itself,
  logs every action, and exits with a meaningful code.
  A script that silently continues past an error is more dangerous than one that crashes.

track: linux
module: shell-scripting
sort_order: 100
difficulty: intermediate
engineer_level: L2
mode: guided

tags:
  - linux
  - bash
  - error-handling
  - trap
  - set-e
  - exit-codes
  - logging
  - shell-scripting

estimated_minutes: 55
timeout_minutes: 110

terraform_module: labs/linux-ec2
scenario_id: hello-linux

environment:
  instance_type: t3.micro
  estimated_cost: "$0.01"
  aws_services:
    - ec2

prerequisites:
  - linux-bash-foundation

briefing:
  severity: sev-4
  impact: No production impact — skill lab
  title: Deployment Script Required
  narrative: |
    Most bash scripts in production have no error handling. When they fail,
    they continue silently, leave half-written files and locked resources behind,
    and produce no useful output. Debugging them means reconstructing what happened.
    This lab teaches the patterns that make scripts predictable: strict mode,
    trap-based cleanup, structured logging, and meaningful exit codes.

evidence:
  - type: note
    title: The goal
    content: |
      Write /usr/local/bin/deploy.sh that:
        - Uses set -euo pipefail
        - Traps EXIT to run cleanup whether it succeeds or fails
        - Logs every action with a timestamp to /var/log/deploy.log
        - Exits with code 0 on success, non-zero with a clear message on failure
        - Creates a lockfile and removes it on exit

objectives:
  - Apply set -euo pipefail and understand what each flag does
  - Use trap to register cleanup functions on EXIT, ERR, and signals
  - Write a structured log function with timestamps and severity levels
  - Design exit codes so callers can distinguish success from different failure modes

deliverables:
  - path: /usr/local/bin/deploy.sh
    description: |
      Deployment script using:
        - set -euo pipefail
        - trap cleanup EXIT
        - log() function writing to /var/log/deploy.log
        - Lockfile at /tmp/deploy.lock
        - At least one intentional error condition with a clear message
  - path: /tmp/deploy-test.txt
    description: |
      Proof of error handling containing:
        - Output of successful run (exit 0)
        - Output of failed run with lock already held (exit non-zero)

success_criteria:
  - /usr/local/bin/deploy.sh exists and is executable
  - Script contains set -euo pipefail
  - Script registers a trap on EXIT
  - Script uses a lockfile to prevent concurrent runs
  - /var/log/deploy.log is written during execution
  - /tmp/deploy-test.txt documents both success and failure cases

hint_policy: show_level_1_automatically
hints:
  - level: 1
    text: |
      Strict mode (line 2 of every script):
        set -euo pipefail
        -e  exit immediately on error
        -u  treat unset variables as errors
        -o pipefail  catch failures inside pipes

      Cleanup trap:
        cleanup() { rm -f /tmp/deploy.lock; echo "Cleaned up"; }
        trap cleanup EXIT
        # Runs cleanup() when the script exits for ANY reason

      Lockfile pattern:
        if ! mkdir /tmp/deploy.lock 2>/dev/null; then
          echo "ERROR: deploy already running" >&2; exit 1
        fi
        # mkdir is atomic — safe for concurrent access

      Log function:
        log() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] [$1] ${*:2}" | tee -a /var/log/deploy.log; }
        log INFO "Starting deployment"
        log ERROR "Failed to download artifact"

  - level: 2
    text: |
      Script structure:

        #!/bin/bash
        set -euo pipefail

        LOCK="/tmp/deploy.lock"
        LOG="/var/log/deploy.log"

        log() {
          local level="$1"; shift
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] [$level] $*" | sudo tee -a "$LOG"
        }

        cleanup() {
          local code=$?
          rm -f "$LOCK"
          [ $code -eq 0 ] && log INFO "Deploy completed successfully" \
                          || log ERROR "Deploy failed with exit code $code"
        }
        trap cleanup EXIT

        # Lockfile — prevents concurrent deploys
        if ! mkdir "$LOCK" 2>/dev/null; then
          echo "ERROR: deploy already running (lock: $LOCK)" >&2
          exit 2
        fi

        log INFO "Starting deploy"
        # ... deployment steps ...
        log INFO "Deploy finished"

      Test both paths:
        sudo chmod +x /usr/local/bin/deploy.sh
        /usr/local/bin/deploy.sh && echo "Exit: $?"
        # Run again while lock exists:
        mkdir /tmp/deploy.lock 2>/dev/null
        /usr/local/bin/deploy.sh; echo "Exit: $?"
        rmdir /tmp/deploy.lock

  - level: 3
    text: |
      Complete script:

        sudo tee /usr/local/bin/deploy.sh << 'SCRIPT'
        #!/bin/bash
        set -euo pipefail

        LOCK="/tmp/deploy.lock"
        LOG="/var/log/deploy.log"
        APP_DIR="/opt/myapp"
        VERSION="${1:-1.0.0}"

        log() {
          local level="$1"; shift
          echo "[$(date '+%Y-%m-%d %H:%M:%S')] [$level] $*" | sudo tee -a "$LOG"
        }

        die() {
          log ERROR "$*"
          exit 1
        }

        cleanup() {
          local code=$?
          rmdir "$LOCK" 2>/dev/null || true
          if [ $code -eq 0 ]; then
            log INFO "Deployment completed successfully (version: $VERSION)"
          else
            log ERROR "Deployment FAILED with exit code $code (version: $VERSION)"
          fi
        }
        trap cleanup EXIT

        # Prevent concurrent deploys
        if ! mkdir "$LOCK" 2>/dev/null; then
          echo "ERROR: deployment already in progress (lock held: $LOCK)" >&2
          exit 2
        fi

        log INFO "Starting deployment of version $VERSION"

        # Validate required binaries
        command -v curl  >/dev/null || die "curl not found"
        command -v rsync >/dev/null 2>&1 || log WARN "rsync not available, using cp"

        # Create app directory
        sudo mkdir -p "$APP_DIR"
        log INFO "App directory: $APP_DIR"

        # Simulate deployment step
        echo "version=$VERSION deployed at $(date)" | sudo tee "$APP_DIR/VERSION" > /dev/null
        log INFO "Version file written: $APP_DIR/VERSION"

        log INFO "All steps complete"
        SCRIPT

        sudo chmod +x /usr/local/bin/deploy.sh
        sudo touch /var/log/deploy.log
        sudo chmod 666 /var/log/deploy.log

        # Test successful run
        {
          echo "=== SUCCESSFUL RUN ==="
          /usr/local/bin/deploy.sh 2.0.0
          echo "Exit code: $?"
        } | tee /tmp/deploy-test.txt

        # Test concurrent lock detection
        mkdir /tmp/deploy.lock 2>/dev/null
        {
          echo ""
          echo "=== LOCK HELD RUN ==="
          /usr/local/bin/deploy.sh 2>/dev/null || true
          echo "Exit code: $?"
        } | tee -a /tmp/deploy-test.txt
        rmdir /tmp/deploy.lock

validation:
  strategy: all
  default_timeout_seconds: 5
  checks:
    - id: script-exists-executable
      name: deploy.sh Exists and Is Executable
      type: ssh
      cmd: test -x /usr/local/bin/deploy.sh
      failure_hint: "Create /usr/local/bin/deploy.sh and chmod +x it"

    - id: script-has-strict-mode
      name: Script Uses set -euo pipefail
      type: ssh
      cmd: grep -q "set -euo pipefail" /usr/local/bin/deploy.sh 2>/dev/null
      failure_hint: "Add 'set -euo pipefail' on line 2 of your script"

    - id: script-has-trap
      name: Script Registers EXIT Trap
      type: ssh
      cmd: grep -q "trap.*EXIT" /usr/local/bin/deploy.sh 2>/dev/null
      failure_hint: "Add: trap cleanup EXIT (define cleanup() function first)"

    - id: script-has-lockfile
      name: Script Uses Lockfile
      type: ssh
      cmd: grep -qE "mkdir.*lock|lock.*mkdir" /usr/local/bin/deploy.sh 2>/dev/null
      failure_hint: "Use 'mkdir LOCKFILE' as an atomic lock: if ! mkdir /tmp/deploy.lock; then exit 2; fi"

    - id: deploy-log-written
      name: Deploy Log Written
      type: ssh
      cmd: test -s /var/log/deploy.log
      failure_hint: "Run: /usr/local/bin/deploy.sh to generate log entries in /var/log/deploy.log"

    - id: test-output-written
      name: Both Run Modes Tested
      type: ssh
      cmd: test -s /tmp/deploy-test.txt && test $(wc -l < /tmp/deploy-test.txt) -ge 4
      failure_hint: "Test both a successful run and a locked-out run, write results to /tmp/deploy-test.txt"

completion_message: |
  set -euo pipefail + trap cleanup EXIT is the minimum viable error handling
  for any script that modifies system state. Without -e, a failed command is
  silently skipped. Without the trap, a crash leaves locks held and temp files
  behind. These two lines turn a fragile script into one that fails loudly,
  cleans up after itself, and gives callers a meaningful exit code to act on.
