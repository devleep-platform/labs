schema_version: 1

metadata:
  version: 1.0.0
  author: devleep-core
  reviewed_by:
    - linux-sme
    - security-sme
  last_updated: 2026-06-13

id: linux-secrets-hygiene
title: "Secrets Hygiene: Find, Remove, and Rotate Exposed Credentials"
description: >
  A developer accidentally committed AWS credentials and a database password
  to a git repository. The exposure is confirmed — the secrets are in git history
  and on disk in plaintext. Contain the exposure, rotate the credentials,
  remove them from the filesystem, and write a prevention plan.

track: linux
module: linux-incident-response
sort_order: 230
difficulty: advanced
engineer_level: L3
mode: incident

tags:
  - linux
  - security
  - secrets
  - credentials
  - git
  - aws
  - incident
  - incident-response
  - hygiene

estimated_minutes: 55
timeout_minutes: 110

terraform_module: labs/linux-ec2
scenario_id: exposed-secrets

environment:
  instance_type: t3.micro
  estimated_cost: "$0.01"
  aws_services:
    - ec2

prerequisites:
  - linux-security-hardening
  - linux-users-and-access

briefing:
  severity: sev-1
  impact: Credentials in version control — potential unauthorized access, data breach
  title: Credentials Exposed in Repository
  narrative: |
    A security scanner flagged that AWS_SECRET_ACCESS_KEY and a database password
    are present in a git repository on the server. The commit was pushed to GitHub
    two days ago. AWS has already sent an automated warning.
    Assume the keys are compromised — they have been public for 48 hours.
    The path to fix is: find → document → rotate → remove → prevent.
  incident:
    detected_at: "2026-05-01T09:22:00Z"
    severity: sev-1
    impacted_services: [all, aws-account, database]

evidence:
  - type: email
    title: "AWS: Potentially Exposed AWS Access Key"
    content: |
      From: aws-security-notifications@amazon.com
      Your AWS account has a potentially exposed access key.
      Key ID: AKIA...XXXXX
      Detected in: public GitHub repository
      Recommended action: Rotate the key immediately.
  - type: security-report
    title: "GitGuardian Alert — Secret in Commit"
    content: |
      Secret detected in commit abc1234
      File: config/database.yml
      Secret type: Generic Database Password
      Repository: dev-team/app-backend
      Committed: 2 days ago

objectives:
  - Audit the filesystem for plaintext credentials
  - Find exposed credentials in the git log
  - Document all exposures before removing anything
  - Remove plaintext credentials from the filesystem
  - Write a remediation plan covering rotation and prevention

deliverables:
  - path: /tmp/secrets-audit.txt
    description: |
      Complete audit of exposed secrets:
        - Every file containing plaintext credentials (grep output)
        - Git commits that contain the secrets (git log with grep)
        - AWS key IDs found (not the secret values — just the IDs)
        - Database connection strings found
  - path: /tmp/secrets-remediation.txt
    description: |
      Remediation plan and actions taken:
        - Files cleaned (plaintext replaced with env var references)
        - Rotation steps for each credential type (AWS key, DB password)
        - Prevention: pre-commit hooks or scanning tools to add
        - How to verify the secrets are no longer reachable in git history

success_criteria:
  - No plaintext AWS_SECRET_ACCESS_KEY or DB_PASSWORD in /home, /opt, /var/www, /etc/app
  - Audit documented in /tmp/secrets-audit.txt including git log results
  - Remediation plan written in /tmp/secrets-remediation.txt
  - At least one .gitignore entry or pre-commit hook added to prevent recurrence
  - /tmp/secrets-remediation.txt includes rotation steps

hint_policy: available_with_penalty
hints:
  - level: 1
    text: |
      Two rules before removing anything:
        1. Document everything you find — you need a complete inventory for rotation
        2. Removing from git history is destructive — coordinate with the team first,
           and rotate credentials before cleaning history (history with dead keys
           is lower risk than live keys in files)

      Order of operations: find → document → rotate → remove from filesystem → clean history → prevent

  - level: 2
    text: |
      Find plaintext secrets on disk:
        grep -r "AWS_SECRET\|aws_secret\|AKIA" /home /opt /var/www /etc 2>/dev/null | grep -v ".git/"
        grep -r "DB_PASSWORD\|db_password\|database_password" /home /opt /var/www /etc 2>/dev/null

      Find secrets in git history:
        cd /path/to/repo
        git log --all -p | grep -i "AKIA\|AWS_SECRET\|password" | head -30

      Remove from filesystem (replace with placeholder):
        sed -i 's/AWS_SECRET_ACCESS_KEY=.*/AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}/' config/aws.conf

      Add prevention:
        # .gitignore for secret file patterns
        echo ".env" >> .gitignore
        echo "*.key" >> .gitignore
        echo "credentials.json" >> .gitignore

        # Pre-commit hook
        cat > .git/hooks/pre-commit << 'HOOK'
        #!/bin/sh
        if git diff --cached | grep -qE "(AKIA|aws_secret|password\s*=\s*['\"][^'\"]{8,})"; then
          echo "Potential secret detected. Aborting commit."
          exit 1
        fi
        HOOK
        chmod +x .git/hooks/pre-commit

  - level: 3
    text: |
      Full remediation:

        # 1. Audit — find all exposures
        {
          echo "=== FILESYSTEM SCAN ==="
          grep -r "AWS_SECRET\|AKIA\|DB_PASSWORD\|database_password" \
            /home /opt /var/www /etc 2>/dev/null | grep -v ".git/"
          echo ""
          echo "=== GIT HISTORY SCAN ==="
          find /home /opt /var/www -name ".git" -type d 2>/dev/null | while read gitdir; do
            repo=$(dirname "$gitdir")
            echo "--- Repo: $repo ---"
            git -C "$repo" log --all -p 2>/dev/null | \
              grep -E "^\+" | \
              grep -iE "AKIA|aws_secret|password\s*=|secret\s*=" | head -10
          done
        } | sudo tee /tmp/secrets-audit.txt

        # 2. Replace plaintext with env var references
        EXPOSED_FILE=/opt/app/config/aws.conf
        if [ -f "$EXPOSED_FILE" ]; then
          sudo sed -i \
            -e 's/^AWS_SECRET_ACCESS_KEY=.*/AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}/' \
            -e 's/^AWS_ACCESS_KEY_ID=.*/AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}/' \
            "$EXPOSED_FILE"
        fi

        # 3. Add .gitignore entries
        find /home /opt /var/www -name ".git" -type d 2>/dev/null | while read gitdir; do
          repo=$(dirname "$gitdir")
          gitignore="$repo/.gitignore"
          grep -q ".env" "$gitignore" 2>/dev/null || \
            printf ".env\n*.key\ncredentials.json\nconfig/secrets.yml\n" >> "$gitignore"
        done

        # 4. Add pre-commit hook
        find /home /opt /var/www -path "*/.git/hooks" -type d 2>/dev/null | while read hookdir; do
          hook="$hookdir/pre-commit"
          cat > "$hook" << 'HOOK'
        #!/bin/sh
        if git diff --cached | grep -qE "(AKIA|aws_secret_access_key|password\s*=\s*['\"][^'\"]{8,})"; then
          echo "Potential secret detected in staged changes. Aborting."
          exit 1
        fi
        HOOK
          chmod +x "$hook"
        done

        # 5. Write remediation plan
        cat > /tmp/secrets-remediation.txt << 'EOF'
        === SECRETS REMEDIATION PLAN ===

        IMMEDIATE (completed):
        - Audited filesystem and git history: see /tmp/secrets-audit.txt
        - Replaced plaintext credentials with env var references
        - Added .gitignore entries for secret file patterns
        - Added pre-commit hook to block future credential commits

        ROTATION REQUIRED (action needed):
        - AWS key AKIA...: Deactivate in IAM console, create new key, update env vars
        - DB_PASSWORD: Change in database, update application config or secrets manager

        HISTORY CLEANUP (after rotation):
        - Use git filter-repo or BFG Repo Cleaner to rewrite history
        - Force-push to remote (coordinate with team)

        PREVENTION:
        - Use AWS Secrets Manager or HashiCorp Vault for all secrets
        - Never put credentials in config files — use environment variables
        - Add trufflehog or gitleaks to CI pipeline
        EOF

validation:
  strategy: all
  default_timeout_seconds: 5
  checks:
    - id: no-plaintext-secrets
      name: No Plaintext Secrets on Filesystem
      type: ssh
      cmd: |
        test $(grep -r "AWS_SECRET_ACCESS_KEY=AKIA\|DB_PASSWORD=.\{8\}" \
          /home /opt /var/www /etc 2>/dev/null | grep -v ".git/" | wc -l) -eq 0
      failure_hint: Replace plaintext secret values with env var references (AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY})

    - id: audit-written
      name: Full Audit Documented
      type: multi_check
      operator: all
      checks:
        - id: file-exists
          type: ssh
          cmd: test -s /tmp/secrets-audit.txt
          failure_hint: Run grep -r and git log scans and write all findings to /tmp/secrets-audit.txt
        - id: has-git-scan
          type: ssh
          cmd: grep -qi "git\|commit\|log\|history\|repo" /tmp/secrets-audit.txt
          failure_hint: Include git history scan results in /tmp/secrets-audit.txt

    - id: prevention-added
      name: Prevention Measures Added
      type: ssh
      cmd: |
        GITIGNORE_OK=$(find /home /opt /var/www -name ".gitignore" -exec grep -l ".env\|secrets\|credentials" {} \; 2>/dev/null | wc -l)
        HOOK_OK=$(find /home /opt /var/www -path "*/.git/hooks/pre-commit" -type f 2>/dev/null | wc -l)
        test "${GITIGNORE_OK:-0}" -gt 0 || test "${HOOK_OK:-0}" -gt 0
      failure_hint: Add .gitignore entries for secret file patterns or install a pre-commit hook

    - id: remediation-written
      name: Remediation Plan Written
      type: ssh
      cmd: test -s /tmp/secrets-remediation.txt && grep -qi "rotat\|prevent\|vault\|env\|gitignore" /tmp/secrets-remediation.txt
      failure_hint: Write a remediation plan covering rotation steps and prevention to /tmp/secrets-remediation.txt

completion_message: |
  Credentials committed to git are permanently compromised.
  git rewrite removes them from history but every clone taken before the rewrite
  still has them — and you cannot know who cloned it.
  The only safe assumption: if a key was in git for even one minute, rotate it.
  Rotation is cheap. A breach from a 48-hour-exposed AWS key is not.
  env vars + secrets managers + pre-commit hooks + CI scanning:
  any one of these would have prevented this. All four are standard practice.
